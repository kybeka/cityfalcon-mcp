

services:
  mcp:
    build: .
    ports:
      - "3000:8000"
    networks:
      - internal

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
    networks:
      - internal

volumes:
  n8n_data:

networks:
  internal:
    driver: bridge